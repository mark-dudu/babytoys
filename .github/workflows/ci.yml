name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            packages.lock.json
            BabyToys.Tests/packages.lock.json

      - name: Restore
        run: dotnet restore BabyToys.Tests/BabyToys.Tests.csproj

      - name: Build
        run: dotnet build BabyToys.Tests/BabyToys.Tests.csproj --configuration Release --no-restore

      - name: Test
        run: dotnet test --project BabyToys.Tests/BabyToys.Tests.csproj --configuration Release --no-build --report-trx --report-trx-filename babytoys.trx --results-directory BabyToys.Tests/TestResults

      - name: Package smoke test
        shell: pwsh
        run: ./scripts/Publish-Release.ps1

      - name: Release notes smoke test
        shell: pwsh
        run: |
          $project = [xml](Get-Content -Raw BabyToys.csproj)
          $version = [string]$project.Project.PropertyGroup.Version
          ./scripts/New-ReleaseNotes.ps1 `
            -Version $version `
            -ChecksumPath "artifacts/BabyToys-v$version-win-x64.zip.sha256" `
            -OutputPath "artifacts/release-notes.md"
          if ((Get-Item artifacts/release-notes.md).Length -eq 0) {
            throw "Generated release notes are empty."
          }

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: BabyToys.Tests/TestResults/*.trx
          if-no-files-found: warn

      - name: Upload release candidate
        uses: actions/upload-artifact@v7
        with:
          name: babytoys-win-x64
          path: |
            artifacts/*.zip
            artifacts/*.sha256
          if-no-files-found: error
